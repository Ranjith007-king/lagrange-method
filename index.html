<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lagrange Interpolation Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Lagrange Interpolation Calculator</h1>
<p class="subtitle">Statistics & Numerical Methods</p>

<div class="card">

<label>Number of Data Points</label>
<input type="number" id="numPoints" min="2" placeholder="Enter number of points">

<button onclick="generateInputs()">Generate Input Table</button>

<div id="tableArea"></div>

<label>Interpolation Value (X)</label>
<input type="number" id="xp" placeholder="Enter X value">

<button class="calculate" onclick="calculate()">Calculate Interpolation</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>

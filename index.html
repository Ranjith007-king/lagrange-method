<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lagrange Interpolation Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Lagrange Method Calculator</h1>
<p class="subtitle">Numerical Methods & Statistics</p>

<div class="card">

<label>Number of Data Points</label>
<input type="number" id="numPoints" min="2" placeholder="Enter number">

<button onclick="generateInputs()">Generate Table</button>

<div id="tableArea"></div>

<label>Value of X (Interpolation Point)</label>
<input type="number" id="xp" placeholder="Enter value of x">

<button class="calculate" onclick="calculate()">Calculate</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
